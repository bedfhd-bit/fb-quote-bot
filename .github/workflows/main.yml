name: Unlimited Quote Bot

on:
  schedule:
    # سيقوم بالنشر كل ساعة (24 مرة في اليوم) - "لامحدود زمنيًا"
    - cron: '0 * * * *'
  workflow_dispatch: # يسمح لك بالضغط على زر النشر يدوياً 100 مرة في الدقيقة إذا أردت!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python main.py

